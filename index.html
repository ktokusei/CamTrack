<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CamTrack — Joint Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    h1 { margin: 1rem 0 0.25rem; font-size: 1.2rem; letter-spacing: 0.05em; }
    p#status { font-size: 0.85rem; color: #aaa; margin-bottom: 0.75rem; min-height: 1.2em; }
    #container { position: relative; width: 100%; max-width: 720px; }
    video { display: block; width: 100%; border-radius: 8px; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 8px; }
    #controls { margin: 0.5rem 0 0.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
    .btn-group { display: flex; border: 1px solid #444; border-radius: 6px; overflow: hidden; }
    .btn-group button { flex: 1; padding: 0.4rem 1.2rem; background: #222; color: #aaa; border: none; cursor: pointer; font-size: 0.9rem; transition: background 0.15s, color 0.15s; }
    .btn-group button.active { background: #00e5ff; color: #111; font-weight: bold; }
    #legend { margin-top: 0.75rem; display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem 1.5rem; font-size: 0.8rem; padding: 0 1rem 1rem; }
    .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  </style>
</head>
<body>
  <h1>CamTrack</h1>
  <p id="status">Loading model…</p>

  <div id="controls">
    <div class="btn-group">
      <button id="btn-human" class="active" onclick="switchMode('human')">🧍 Human</button>
      <button id="btn-dog"              onclick="switchMode('dog')">🐕 Dog</button>
    </div>
    <div class="btn-group">
      <button id="btn-front"           onclick="switchCamera('user')">🤳 Front</button>
      <button id="btn-back" class="active" onclick="switchCamera('environment')">📷 Back</button>
    </div>
  </div>

  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <div id="legend"></div>

  <script type="module">
    import {
      PoseLandmarker,
      FilesetResolver,
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

    // Backend URL for dog mode. Priority: ?api= param > window.CAMTRACK_API > localhost default.
    const API_BASE = new URLSearchParams(location.search).get("api")
                  || window.CAMTRACK_API
                  || "http://localhost:8003";

    const video   = document.getElementById("video");
    const canvas  = document.getElementById("overlay");
    const ctx     = canvas.getContext("2d");
    const status  = document.getElementById("status");
    const legend  = document.getElementById("legend");

    const DOT_RADIUS   = 10;
    const LABEL_OFFSET = 16;

    // ── Mode definitions ────────────────────────────────────────────────────
    const MODES = {
      human: {
        modelPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
        groups: [
          { label: "Shoulder", color: "#00e5ff", indices: [11, 12] },
          { label: "Elbow",    color: "#ff4081", indices: [13, 14] },
          { label: "Wrist",    color: "#ff9800", indices: [15, 16] },
          { label: "Hip",      color: "#69f0ae", indices: [23, 24] },
          { label: "Knee",     color: "#ffeb3b", indices: [25, 26] },
          { label: "Ankle",    color: "#e040fb", indices: [27, 28] },
        ],
        bones: [
          [11,12], [11,13],[13,15], [12,14],[14,16],
          [11,23],[12,24], [23,24],
          [23,25],[25,27], [24,26],[26,28],
        ],
      },
      dog: {
        // Ultralytics Dog-Pose 24-keypoint schema:
        // 0=FL-paw 1=FL-knee 2=FL-elbow  3=RL-paw 4=RL-knee 5=RL-elbow
        // 6=FR-paw 7=FR-knee 8=FR-elbow  9=RR-paw 10=RR-knee 11=RR-elbow
        // 12=tail_start  22=withers
        // Front leg anatomy: elbow(2/8)=Shoulder, knee(1/7)=Elbow, paw(0/6)=Paw
        // Rear leg anatomy:  elbow(5/11)=Hip,      knee(4/10)=Knee, paw(3/9)=Ankle
        modelPath: "",
        groups: [
          { label: "FL-Shoulder", color: "#00e5ff", indices: [2] },
          { label: "FR-Shoulder", color: "#00e5ff", indices: [8] },
          { label: "FL-Elbow",    color: "#ff4081", indices: [1] },
          { label: "FR-Elbow",    color: "#ff4081", indices: [7] },
          { label: "FL-Paw",      color: "#ff9800", indices: [0] },
          { label: "FR-Paw",      color: "#ff9800", indices: [6] },
          { label: "RL-Hip",      color: "#69f0ae", indices: [5] },
          { label: "RR-Hip",      color: "#69f0ae", indices: [11] },
          { label: "RL-Knee",     color: "#ffeb3b", indices: [4] },
          { label: "RR-Knee",     color: "#ffeb3b", indices: [10] },
          { label: "RL-Ankle",    color: "#e040fb", indices: [3] },
          { label: "RR-Ankle",    color: "#e040fb", indices: [9] },
        ],
        bones: [
          [0, 1],[1, 2],[2, 22],    // front left leg → withers
          [6, 7],[7, 8],[8, 22],    // front right leg → withers
          [3, 4],[4, 5],[5, 12],    // rear left leg → tail base
          [9,10],[10,11],[11,12],   // rear right leg → tail base
          [22, 12],                 // spine: withers → tail base
          [2, 8],                   // across front elbows
          [5, 11],                  // across rear elbows
        ],
      },
    };

    // ── State ───────────────────────────────────────────────────────────────
    let currentMode   = "human";
    let currentCamera = "environment";
    let landmarkers   = {};
    let lastVideoTime = -1;
    let vision;

    // Dog mode: last keypoints received from the API, drawn every frame
    let dogKeypoints  = [];
    let dogApiTimer   = null;

    // ── Helpers ─────────────────────────────────────────────────────────────
    function buildLandmarkMap(groups) {
      const map = {};
      for (const g of groups) {
        for (const idx of g.indices) map[idx] = { color: g.color, label: g.label };
      }
      return map;
    }

    function renderLegend(groups) {
      const seen = new Set();
      legend.innerHTML = groups
        .filter(g => {
          const key = g.color;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .map(g => {
          const base = g.label.replace(/^[FR][LR]-/, '');
          return `<span><span class="dot" style="background:${g.color}"></span>${base}</span>`;
        })
        .join("");
    }

    // ── Mode switching ───────────────────────────────────────────────────────
    window.switchMode = async function(mode) {
      if (mode === currentMode) return;
      currentMode = mode;
      document.getElementById("btn-human").classList.toggle("active", mode === "human");
      document.getElementById("btn-dog").classList.toggle("active",   mode === "dog");
      renderLegend(MODES[mode].groups);

      if (mode === "dog") {
        dogKeypoints = [];
        startDogApiPolling();
        status.textContent = "Tracking (dog mode — backend API)…";
      } else {
        stopDogApiPolling();
        if (!landmarkers[mode]) {
          status.textContent = `Loading ${mode} model…`;
          landmarkers[mode] = await loadModel(MODES[mode].modelPath);
        }
        status.textContent = "Tracking…";
      }
    };

    // ── Dog API polling (10 fps) ─────────────────────────────────────────────
    const apiCanvas = document.createElement("canvas");
    const apiCtx    = apiCanvas.getContext("2d");

    function startDogApiPolling() {
      stopDogApiPolling();
      dogApiTimer = setInterval(sendFrameToApi, 100);
    }

    function stopDogApiPolling() {
      if (dogApiTimer) { clearInterval(dogApiTimer); dogApiTimer = null; }
    }

    async function sendFrameToApi() {
      if (!video.videoWidth) return;
      apiCanvas.width  = video.videoWidth;
      apiCanvas.height = video.videoHeight;
      apiCtx.drawImage(video, 0, 0);
      apiCanvas.toBlob(async blob => {
        if (!blob) return;
        const form = new FormData();
        form.append("file", blob, "frame.jpg");
        try {
          const res = await fetch(`${API_BASE}/detect`, { method: "POST", body: form });
          if (res.ok) {
            const data = await res.json();
            dogKeypoints = data.keypoints || [];
          }
        } catch (_) { /* backend unreachable — keep last keypoints */ }
      }, "image/jpeg", 0.7);
    }

    window.switchCamera = async function(facing) {
      if (facing === currentCamera) return;
      currentCamera = facing;
      document.getElementById("btn-front").classList.toggle("active", facing === "user");
      document.getElementById("btn-back").classList.toggle("active",  facing === "environment");
      // Stop existing stream before requesting the new camera
      if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
      lastVideoTime = -1;
      status.textContent = "Switching camera…";
      await startCamera();
    };

    async function loadModel(modelPath) {
      // Try GPU first; fall back to CPU (GPU delegate fails silently on some desktop browsers)
      try {
        const m = await PoseLandmarker.createFromOptions(vision, {
          baseOptions: { modelAssetPath: modelPath, delegate: "GPU" },
          runningMode: "VIDEO",
          numPoses: 1,
        });
        return m;
      } catch (_) {
        return PoseLandmarker.createFromOptions(vision, {
          baseOptions: { modelAssetPath: modelPath, delegate: "CPU" },
          runningMode: "VIDEO",
          numPoses: 1,
        });
      }
    }

    // ── Init ────────────────────────────────────────────────────────────────
    async function init() {
      vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
      );
      landmarkers.human = await loadModel(MODES.human.modelPath);
      renderLegend(MODES.human.groups);
      status.textContent = "Model loaded — requesting camera…";
      await startCamera();
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: currentCamera }, width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false,
        });
        video.srcObject = stream;
        video.addEventListener("loadeddata", () => {
          status.textContent = "Tracking…";
          requestAnimationFrame(detect);
        });
      } catch (err) {
        status.textContent = `Camera error: ${err.message}`;
      }
    }

    // ── Render loop ──────────────────────────────────────────────────────────
    function drawDot(x, y, color, label) {
      ctx.beginPath();
      ctx.arc(x, y, DOT_RADIUS, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(x, y, DOT_RADIUS + 2, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(255,255,255,0.7)";
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = "#fff";
      ctx.font = "bold 12px sans-serif";
      ctx.fillText(label, x + LABEL_OFFSET, y + 4);
    }

    function syncCanvas() {
      if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
      }
    }

    // Last successfully drawn landmarks — reused on frames where no new inference ran
    let lastLandmarks = null;

    function drawHumanLandmarks(lm, bones, landmarkMap) {
      ctx.lineWidth = 3;
      ctx.strokeStyle = "rgba(255,255,255,0.5)";
      for (const [a, b] of bones) {
        const pa = lm[a], pb = lm[b];
        if (!pa || !pb || pa.visibility < 0.5 || pb.visibility < 0.5) continue;
        ctx.beginPath();
        ctx.moveTo(pa.x * canvas.width, pa.y * canvas.height);
        ctx.lineTo(pb.x * canvas.width, pb.y * canvas.height);
        ctx.stroke();
      }
      for (const [idxStr, { color, label }] of Object.entries(landmarkMap)) {
        const pt = lm[+idxStr];
        if (!pt || pt.visibility < 0.5) continue;
        drawDot(pt.x * canvas.width, pt.y * canvas.height, color, label);
      }
    }

    function detect() {
      const { groups, bones } = MODES[currentMode];
      const landmarkMap = buildLandmarkMap(groups);

      syncCanvas();

      if (currentMode === "dog") {
        // Dog: API updates dogKeypoints at 10fps; redraw every rAF from latest data
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const byIdx = {};
        for (const kp of dogKeypoints) byIdx[kp.index] = kp;

        ctx.lineWidth = 3;
        ctx.strokeStyle = "rgba(255,255,255,0.5)";
        for (const [a, b] of bones) {
          const pa = byIdx[a], pb = byIdx[b];
          if (!pa || !pb || pa.confidence < 0.5 || pb.confidence < 0.5) continue;
          ctx.beginPath();
          ctx.moveTo(pa.x * canvas.width, pa.y * canvas.height);
          ctx.lineTo(pb.x * canvas.width, pb.y * canvas.height);
          ctx.stroke();
        }
        for (const [idxStr, { color, label }] of Object.entries(landmarkMap)) {
          const kp = byIdx[+idxStr];
          if (!kp || kp.confidence < 0.5) continue;
          drawDot(kp.x * canvas.width, kp.y * canvas.height, color, label);
        }

      } else {
        // Human: only run inference on new video frames; reuse last result otherwise
        const landmarker = landmarkers[currentMode];
        if (landmarker && video.currentTime !== lastVideoTime) {
          lastVideoTime = video.currentTime;
          const result = landmarker.detectForVideo(video, performance.now());
          lastLandmarks = result.landmarks.length > 0 ? result.landmarks[0] : null;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (lastLandmarks) drawHumanLandmarks(lastLandmarks, bones, landmarkMap);
      }

      requestAnimationFrame(detect);
    }

    init().catch(err => {
      status.textContent = `Init error: ${err.message}`;
      console.error(err);
    });
  </script>
</body>
</html>
