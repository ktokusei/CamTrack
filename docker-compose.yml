services:
  camtrack-backend:
    build: ./backend
    container_name: camtrack-backend
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      MODEL_PATH: /models/dog-pose-best.pt
      MODEL_TYPE: dog
    volumes:
      - ./models:/models
      - ./index.html:/app/index.html:ro
